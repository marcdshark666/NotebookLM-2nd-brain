<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NotebookLM 2nd Brain</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <div class="backdrop" aria-hidden="true"></div>

    <main class="minimal-shell">
      <button id="agent-orb-button" class="agent-orb-button" type="button">
        <span class="orb-halo orb-halo-1"></span>
        <span class="orb-halo orb-halo-2"></span>
        <span class="orb-halo orb-halo-3"></span>
        <canvas id="agent-orb-canvas" class="agent-orb-canvas"></canvas>
        <span class="orb-noise"></span>

        <span class="orb-center">
          <span class="orb-kicker">AI Agent</span>
          <strong id="orb-title" class="orb-title">Waiting</strong>
          <span id="orb-copy" class="orb-copy">Login with Google to continue.</span>
        </span>
      </button>

      <section class="panel minimal-panel">
        <div class="minimal-row minimal-row-single">
          <button id="connect-button" class="primary-action" type="button">Login with Google</button>
        </div>

        <form id="ask-form" class="minimal-ask">
          <label for="question-input" class="sr-only">Din fraga</label>
          <textarea
            id="question-input"
            name="question"
            rows="4"
            placeholder="Ask"
          ></textarea>
          <button id="ask-button" class="primary-action" type="submit">Ask</button>
        </form>

        <div id="answer-shell" class="answer-shell empty">
          <p id="answer-text"></p>
        </div>
      </section>

      <div class="app-hidden" aria-hidden="true">
        <div id="auth-pill" class="status-pill"></div>
        <span id="auth-copy"></span>
        <input id="client-id-input" type="text" />
        <code id="origin-output"></code>
        <code id="pages-output"></code>
        <button id="logout-button" type="button">Logout</button>
        <button id="clear-client-id-button" type="button">Clear</button>
        <span id="orb-chip-auth" class="mode-chip"></span>
        <span id="orb-chip-scan" class="mode-chip"></span>
        <span id="orb-chip-answer" class="mode-chip"></span>
        <strong id="session-indicator">Offline</strong>
        <strong id="source-indicator">0 loaded</strong>
        <strong id="mode-indicator">Idle</strong>
        <form id="source-form">
          <input id="source-query" type="search" />
          <button id="refresh-button" type="button">Refresh</button>
        </form>
        <div id="source-summary"></div>
        <div id="source-list"></div>
        <ol id="citation-list"></ol>
        <ul id="matched-list"></ul>
        <ul id="skipped-list"></ul>
      </div>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
